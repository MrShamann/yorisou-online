name: CPV1-R1 CI

# CPV1-R1 §11 — remote CI for the CPV1 integrated-preview branch / PR #114.
# The repo's existing "Yorisou Check" workflow only triggers on PRs to `main`;
# PR #114's base is a feature branch, so it needs its own coverage. This workflow
# runs the CPV1 + CPV1-R1 contract suites, the AIX/SR/APP regression suites,
# typecheck, focused lint, the migration-SQL guard, a secret scan, the production
# build, and a FRESH axe accessibility gate against the built app.

on:
  push:
    branches: [feat/cpv1-integrated-platform]
  pull_request:
    branches: [feat/aix-1-ai-native-experience, feat/cpv1-integrated-platform, main]
  workflow_dispatch:

concurrency:
  group: cpv1-r1-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Contracts, types, migration + secret guards
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the branch-diff secret scan can resolve origin/main..HEAD
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Focused lint (R1/CPV1 surface — hard gate)
        run: npx eslint lib/cpv1 lib/yorisou-tests/__tests__/cpv1Completion.test.ts tests/smoke/cpv1r1-axe.spec.ts scripts/validate-cpv1-migrations.mjs

      - name: Full-repo lint (report-only — pre-existing debt on origin/main)
        run: npm run lint || true

      - name: Migration-SQL guard (additive + reversible + non-destructive)
        run: node scripts/validate-cpv1-migrations.mjs

      - name: Secret-pattern hard gate
        run: "! git grep -nE '(sk-[A-Za-z0-9]{20,}|eyJ[a-zA-Z0-9_-]{20,}|sbp_[A-Za-z0-9_-]{20,})'"

      - name: Install gitleaks
        run: |
          curl -sSL -o /tmp/gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks

      - name: 11A.8 Changed-content secret scan (HARD gate — origin/main..HEAD)
        # New content on this branch must introduce NO secrets, even though full
        # history retains pre-existing localStorage/save-state false positives.
        run: |
          git fetch --no-tags origin main
          /tmp/gitleaks detect --no-banner --redact --exit-code 1 --log-opts="origin/main..HEAD"

      - name: gitleaks full history (report-only — pre-existing localStorage/save-state false positives)
        run: /tmp/gitleaks detect --no-banner --redact --exit-code 0 || true
        continue-on-error: true

      - name: CPV1 foundation contract (rights gate + §3–§10)
        run: npm run test:cpv1

      - name: AIX regression (AIX-4, AIX-5)
        run: |
          npm run test:aix4
          npm run test:aix5

      - name: Stranger-Ready regression (SR-1, SR-2)
        run: |
          npm run test:sr1
          npm run test:sr2

      - name: App-platform regression (APP-1, APP-2)
        run: |
          npm run test:app1
          npm run test:app2

      - name: Core product regression (definitions, return-loop, reveal a11y)
        run: |
          npm run test:c02
          npm run test:relationship-fatigue
          npm run test:result-reveal

  axe:
    name: Fresh axe accessibility gate (0 critical + 0 serious)
    runs-on: ubuntu-latest
    needs: contracts
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build (safe env defaults)
        run: npm run build
        env:
          YORISOU_SHARED_STORE_REGION: us-east-2
          OPENAI_MODEL: gpt-4.1-mini
          MISTRAL_MODEL: mistral-small-latest

      - name: Start production server
        run: |
          YORISOU_SHARED_STORE_REGION=us-east-2 OPENAI_MODEL=gpt-4.1-mini MISTRAL_MODEL=mistral-small-latest \
            nohup npx next start -p 3000 > /tmp/next-start.log 2>&1 &
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:3000/ || true)
            [ "$code" = "200" ] && { echo "server up after ${i}s"; break; }
            sleep 1
          done

      - name: Fresh axe (mobile/tablet/desktop × default/reduced-motion)
        run: npx playwright test tests/smoke/cpv1r1-axe.spec.ts --project=desktop
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000

      - name: Upload axe evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpv1-r1-axe-evidence
          path: docs/cpv1/evidence/r1/axe/
          if-no-files-found: warn
