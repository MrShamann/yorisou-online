name: Yorisou Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  agent-runtime-postgres:
    name: Agent Runtime PostgreSQL Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: yorisou_agent_runtime_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d yorisou_agent_runtime_test"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run test:agent-runtime
      - run: npm run test:c02
      - run: npm run test:relationship-fatigue
      - run: npm run test:experience-cards
      - run: npm run test:agent-runtime:db
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/yorisou_agent_runtime_test
      - run: npx tsc --noEmit

  check:
    name: Lint, Build & Env Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (report-only)
        # Full-repo lint is temporarily report-only because origin/main contains
        # existing product-code lint debt. Tighten this to a hard gate after the
        # lint debt cleanup PR lands (app/admin, InsightsPreview, MotionReveal,
        # SupportWorkspace, reservation-mobility-support, lib/insights).
        run: npm run lint || true

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: C02 definition and scoring checks
        run: npm run test:c02

      - name: Relationship-fatigue return-loop checks
        run: npm run test:relationship-fatigue

      - name: Experience Card contracts
        run: npm run test:experience-cards

      - name: Result-reveal contracts (incl. YRR-1 aria-hidden/inert gate)
        run: npm run test:result-reveal

      - name: Imairo snapshot contracts (RTR-1 private save)
        run: npm run test:imairo-snapshot

      - name: Secret-pattern check
        run: "! git grep -nE '(sk-[A-Za-z0-9]{20,}|eyJ[a-zA-Z0-9_-]{20,}|sbp_[A-Za-z0-9_-]{20,})'"

      - name: Env check (informational)
        run: npm run check:env
        # Exits 0 even when vars are missing — informational only in CI
        continue-on-error: false

      - name: Build
        run: npm run build
        env:
          # Provide safe defaults so build doesn't fail on missing optional vars
          YORISOU_SHARED_STORE_REGION: us-east-2
          OPENAI_MODEL: gpt-4.1-mini
          MISTRAL_MODEL: mistral-small-latest

  smoke-openclaw:
    name: OpenClaw Webhook Smoke
    runs-on: ubuntu-latest
    needs: check
    if: vars.OPENCLAW_SMOKE_ENABLED == 'true'
    # Enable by setting repository variable OPENCLAW_SMOKE_ENABLED=true
    # and repository secrets OPENCLAW_WEBHOOK_URL + OPENCLAW_WEBHOOK_TOKEN

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: OpenClaw smoke
        run: node scripts/openclaw-webhook-smoke.mjs
        env:
          OPENCLAW_WEBHOOK_URL: ${{ secrets.OPENCLAW_WEBHOOK_URL }}
          OPENCLAW_WEBHOOK_TOKEN: ${{ secrets.OPENCLAW_WEBHOOK_TOKEN }}

  smoke-hermes:
    name: Hermes Webhook Smoke
    runs-on: ubuntu-latest
    needs: check
    if: vars.HERMES_SMOKE_ENABLED == 'true'
    # Enable by setting repository variable HERMES_SMOKE_ENABLED=true
    # and repository secrets HERMES_WEBHOOK_URL + HERMES_WEBHOOK_TOKEN

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Hermes smoke
        run: node scripts/hermes-webhook-smoke.mjs
        env:
          HERMES_WEBHOOK_URL: ${{ secrets.HERMES_WEBHOOK_URL }}
          HERMES_WEBHOOK_TOKEN: ${{ secrets.HERMES_WEBHOOK_TOKEN }}
