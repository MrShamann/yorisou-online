version: 1
frontend:
  phases:
    preBuild:
      commands:
        - printf "YORISOU_SHARED_STORE_BUCKET=%s\n" "$YORISOU_SHARED_STORE_BUCKET" > .env.production
        - printf "YORISOU_SHARED_STORE_REGION=%s\n" "${YORISOU_SHARED_STORE_REGION:-us-east-2}" >> .env.production
        - printf "LINE_CHANNEL_ID=%s\n" "$LINE_CHANNEL_ID" >> .env.production
        - printf "LINE_CHANNEL_SECRET=%s\n" "$LINE_CHANNEL_SECRET" >> .env.production
        - printf "LINE_LOGIN_CHANNEL_SECRET=%s\n" "${LINE_LOGIN_CHANNEL_SECRET:-$LINE_CHANNEL_SECRET}" >> .env.production
        - printf "LINE_MESSAGING_CHANNEL_SECRET=%s\n" "$LINE_MESSAGING_CHANNEL_SECRET" >> .env.production
        - printf "LINE_REDIRECT_URI=%s\n" "$LINE_REDIRECT_URI" >> .env.production
        - printf "LINE_SCOPE=%s\n" "${LINE_SCOPE:-openid profile}" >> .env.production
        - printf "LINE_MESSAGING_CHANNEL_ACCESS_TOKEN=%s\n" "$LINE_MESSAGING_CHANNEL_ACCESS_TOKEN" >> .env.production
        - printf "RESEND_API_KEY=%s\n" "$RESEND_API_KEY" >> .env.production
        - printf "PASSWORD_RESET_FROM_EMAIL=%s\n" "$PASSWORD_RESET_FROM_EMAIL" >> .env.production
        - printf "CONTACT_FROM_EMAIL=%s\n" "$CONTACT_FROM_EMAIL" >> .env.production
        - printf "OPENCLOUD_SUPPORT_CHAT_URL=%s\n" "$OPENCLOUD_SUPPORT_CHAT_URL" >> .env.production
        - printf "OPENCLOUD_SUPPORT_CHAT_TOKEN=%s\n" "$OPENCLOUD_SUPPORT_CHAT_TOKEN" >> .env.production
        - printf "OPENCLOUD_SUPPORT_MODEL=%s\n" "${OPENCLOUD_SUPPORT_MODEL:-vercel-ai-gateway/mistral/devstral-2}" >> .env.production
        - printf "MISTRAL_API_KEY=%s\n" "$MISTRAL_API_KEY" >> .env.production
        - printf "MISTRAL_MODEL=%s\n" "${MISTRAL_MODEL:-mistral-small-latest}" >> .env.production
        - printf "OPENAI_API_KEY=%s\n" "$OPENAI_API_KEY" >> .env.production
        - printf "OPENAI_MODEL=%s\n" "${OPENAI_MODEL:-gpt-4.1-mini}" >> .env.production
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
